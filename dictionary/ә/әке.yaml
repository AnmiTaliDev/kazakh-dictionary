- id: 10
  word: "әке"
  parent_id: null
  type: "noun"
  transcription: "æˈke"
  writing_systems:
    latin_2017: "äke"
    latin_2021: "äke"
    latin_my: "äke"
  root_word: "әке"
  etymology: "From Proto-Turkic *aka ('elder brother', 'senior male relative'). Cognate with Turkish 'ağa', Uzbek 'aka'. Alternatively, a contraction of 'ateke' (from 'ata' + diminutive '-eke')."
  history: "The meaning shifted from 'elder brother' (found in other Turkic languages) to 'father' in Kazakh. In southern and western dialects, 'koke' or 'ata' is sometimes used for 'father', retaining the older Turkic usage."
  definitions:
    - meaning: "Баланың ата-анасының еркек жағы"
      translation_ru: "Отец"
      translation_en: "Father"
      examples:
        - kk: "Менің әкем мұғалім."
          ru: "Мой отец - учитель."
          en: "My father is a teacher."
        - kk: "Әке мен ана."
          ru: "Отец и мать."
          en: "Father and mother."
  antonyms:
    - word_id: null
      word: "ана"
      note: "Мать"
  synonyms:
    - word_id: 8
      word: "ата"
      note: "В некоторых диалектах"
