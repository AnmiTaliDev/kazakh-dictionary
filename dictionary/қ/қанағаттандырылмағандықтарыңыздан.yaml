  definitions:
    - meaning: "小褨蟹写械褉写褨遥 褉懈蟹邪 斜芯谢屑邪覔邪薪写褘覜褌邪褉褘遥褘蟹写邪薪 (械遥 冶蟹邪覜 褋萤蟹)"
      translation_ru: "袠蟹-蟹邪 胁邪褕械谐芯 (屑薪.褔.) 薪械写芯胁芯谢褜褋褌胁邪/薪械褍写芯胁谢械褌胁芯褉械薪懈褟"
      translation_en: "Because of your (plural) dissatisfaction"
      examples:
        - kk: "袘冶谢 卸邪覔写邪泄 褋褨蟹写械褉写褨遥 覜邪薪邪覔邪褌褌邪薪写褘褉褘谢屑邪覔邪薪写褘覜褌邪褉褘遥褘蟹写邪薪 褌褍褘薪写邪写褘."
          ru: "协褌邪 褋懈褌褍邪褑懈褟 胁芯蟹薪懈泻谢邪 懈蟹-蟹邪 胁邪褕械谐芯 薪械写芯胁芯谢褜褋褌胁邪."
          en: "This situation arose because of your dissatisfaction."
