- id: 73
  word: "қазақ"
  parent_id: null
  type: "noun"
  transcription: "qɑˈzɑq"
  writing_systems:
    latin_2017: "qazaq"
    latin_2021: "qazaq"
    latin_my: "qazaq"
  root_word: "қазақ"
  etymology: "From Turkic verb *qaz- ('to wander', 'to roam'). Originally meaning 'free', 'independent', 'vagabond'. Less likely related to 'ak' (white) + 'qaz' (goose) legend."
  history: "First recorded as a social term for independent groups separating from their tribes (13th-14th centuries). Became an ethnonym with the formation of the Kazakh Khanate (1465) by Janibek and Kerei, designating the people who left the Uzbek Khanate."
  definitions:
    - meaning: "Қазақстанның негізгі халқы"
      translation_ru: "Казах"
      translation_en: "Kazakh"
      examples:
        - kk: "Мен қазақпын."
          ru: "Я казах."
          en: "I am Kazakh."
        - kk: "Қазақ тілі."
          ru: "Казахский язык."
          en: "Kazakh language."
    - meaning: "Қазақстанға қатысты"
      translation_ru: "Казахский"
      translation_en: "Kazakh"
      examples:
        - kk: "Қазақ мәдениеті."
          ru: "Казахская культура."
          en: "Kazakh culture."
