  word: "ана"
  parent_id: null
  type: "noun"
  transcription: "ɑˈnɑ"
  writing_systems:
    latin_2017: "ana"
    latin_2021: "ana"
    latin_my: "ana"
  root_word: "ана"
  etymology: "From Proto-Turkic *ana ('mother'). Cognate with Turkish 'anne', Uzbek 'ona', Tatar 'ana'. Likely of nursery origin (baby talk)."
  history: "An ancient Turkic word found in the 11th-century 'Diwan Lughat al-Turk'. Beyond the biological meaning, it is used in sacred concepts like 'Ana tili' (Mother tongue) and 'Jer-Ana' (Mother Earth). Distinguished from 'sheshe' by a more elevated, poetic tone."
  definitions:
    - meaning: "Баланы туған әйел"
      translation_ru: "Мать, мама"
      translation_en: "Mother, mom"
      examples:
        - kk: "Менің анам."
          ru: "Моя мама."
          en: "My mother."
        - kk: "Ана мен әке."
          ru: "Мать и отец."
          en: "Mother and father."
  antonyms:
    - word_id: 10
      word: "әке"
      note: "Отец"
  synonyms:
    - word_id: null
      word: "шеше"
      note: "Разговорный вариант"
