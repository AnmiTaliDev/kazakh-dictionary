  etymology: "From Proto-Turkic *bāla ('child', 'young of an animal'). Cognate with Turkish 'bala' (child/cub), Uzbek 'bola', Kyrgyz 'bala'."
  history: "Originally meant 'young animal' or 'fledgling' in ancient Turkic, broadening to 'child' in most modern branches. It is a fundamental kinship term in Kazakh."
