- id: 66
  word: "кез"
  parent_id: null
  type: "noun"
  transcription: "kez"
  writing_systems:
    latin_2017: "kez"
    latin_2021: "kez"
    latin_my: "kez"
  root_word: "кез"
  etymology: "From Turkic root *kez- ('to wander', 'to traverse', 'to patrol'). Cognate with Turkish 'gez-' (to wander)."
  history: "The meaning shifted from 'traversing a distance' to 'a specific point in time' or 'turn/period'. Also used as a historical measure of length (approx. 71-100 cm, 'gez')."
  definitions:
    - meaning: "Белгілі бір уақыт аралығы"
      translation_ru: "Момент, время, период"
      translation_en: "Moment, time, period"
      examples:
        - kk: "Қазіргі кезде."
          ru: "В настоящий момент."
          en: "At the present time."
        - kk: "Сол кезде."
          ru: "В то время."
          en: "At that time."
  synonyms:
    - word_id: 25
      word: "уақыт"
      note: "Время"
