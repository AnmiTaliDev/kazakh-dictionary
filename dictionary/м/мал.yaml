- id: 84
  word: "мал"
  parent_id: null
  type: "noun"
  transcription: "mɑl"
  writing_systems:
    latin_2017: "mal"
    latin_2021: "mal"
    latin_my: "mal"
  root_word: "мал"
  etymology: "From Arabic 'māl' (مال) meaning 'wealth', 'property', 'money'."
  history: "Borrowed from Arabic. In nomadic Turkic culture, livestock was the primary form of wealth, so the term narrowed to mean 'cattle/livestock' specifically, while retaining the broader sense in compounds like 'mal-mülik'."
  definitions:
    - meaning: "Үй жануарлары"
      translation_ru: "Скот, домашние животные"
      translation_en: "Livestock, cattle"
      examples:
        - kk: "Мал бағу."
          ru: "Пасти скот."
          en: "To herd livestock."
        - kk: "Ірі қара мал."
          ru: "Крупный рогатый скот."
          en: "Large cattle."
    - meaning: "Байлық, мүлік"
      translation_ru: "Богатство, имущество"
      translation_en: "Wealth, property"
      examples:
        - kk: "Мал-мүлік."
          ru: "Имущество."
          en: "Property."
