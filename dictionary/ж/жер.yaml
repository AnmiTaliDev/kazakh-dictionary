- id: 12
  word: "жер"
  parent_id: null
  type: "noun"
  transcription: "ʒer"
  writing_systems:
    latin_2017: "jer"
    latin_2021: "jer"
    latin_my: "jer"
  root_word: "жер"
  etymology: "From Proto-Turkic *yer/*jer ('earth', 'ground', 'place'). Cognate with Turkish 'yer', Uzbek 'yer', Kyrgyz 'jer'."
  history: "An ancient Turkic word attested in the 8th-century Orkhon inscriptions. Historically associated with the ancient Turkic deity 'Jer-Su' (Earth-Water). It has retained its primary meaning and form across almost all Turkic languages for over a millennium."
  definitions:
    - meaning: "Адамдар мен жануарлар, өсімдіктер өмір сүретін планета"
      translation_ru: "Земля"
      translation_en: "Earth"
      examples:
        - kk: "Жер шары."
          ru: "Земной шар."
          en: "The globe."
        - kk: "Жер бетінде."
          ru: "На поверхности земли."
          en: "On the earth's surface."
    - meaning: "Жер бетінің қатты қабаты, топырақ"
      translation_ru: "Земля, почва"
      translation_en: "Ground, soil"
      examples:
        - kk: "Жерге егу."
          ru: "Сеять в землю."
          en: "To sow in the ground."
    - meaning: "Белгілі бір аумақ, өлке"
      translation_ru: "Земля, край"
      translation_en: "Land, region"
      examples:
        - kk: "Туған жер."
          ru: "Родная земля."
          en: "Native land."
  antonyms:
    - word_id: null
      word: "аспан"
      note: "Небо"
