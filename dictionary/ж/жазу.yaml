  root_word: "жаз"
  etymology: "Old Turkic 'yaz-'"
  history: "Inherited from Common Turkic *yaz- (to write). Cognate with Turkish 'yazmak', Kyrgyz 'jazuu', Tatar 'yazu'. Originally meant to scratch or incise."
  definitions:
    - meaning: "Әріптерді, таңбаларды түсіру"
      translation_ru: "Писать"
      translation_en: "To write"
      examples:
        - kk: "Хат жазу."
          ru: "Писать письмо."
          en: "To write a letter."
        - kk: "Күнделік жазу."
          ru: "Вести дневник (писать в дневнике)."
          en: "To write in a diary."
