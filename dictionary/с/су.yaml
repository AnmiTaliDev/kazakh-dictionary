- id: 19
  word: "су"
  parent_id: null
  type: "noun"
  transcription: "sʊ"
  writing_systems:
    latin_2017: "sý"
    latin_2021: "su"
    latin_my: "su"
  root_word: "су"
  etymology: "Old Turkic 'suv'"
  history: "Inherited from Common Turkic *sub / *suv. Cognate with Turkish 'su', Uzbek 'suv', Kyrgyz 'suu'. One of the most stable core vocabulary items in Turkic languages, representing water and life."
  definitions:
    - meaning: "Түссіз, иіссіз сұйық зат"
      translation_ru: "Вода"
      translation_en: "Water"
      examples:
        - kk: "Су ішу."
          ru: "Пить воду."
          en: "To drink water."
        - kk: "Таза су."
          ru: "Чистая вода."
          en: "Clean water."
    - meaning: "Өзен, көл"
      translation_ru: "Река, водоём"
      translation_en: "River, body of water"
      examples:
        - kk: "Үлкен су."
          ru: "Большая река."
          en: "Big river."
