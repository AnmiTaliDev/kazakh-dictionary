name: Update Word List

on:
  push:
    paths:
      - 'dictionary/**'
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install PyYAML

      - name: Update LIST.md
        run: python scripts/update_list.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add LIST.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-update LIST.md"
          git push
